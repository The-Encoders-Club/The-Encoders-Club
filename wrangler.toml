name = "the-encoders-club"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ========== D1 Database ==========
[[d1_databases]]
binding = "DB"
database_name = "encoders-club-db"
database_id = "40128b9d-9e00-406a-a80f-96c7830fbb75"

# ========== R2 Storage (Avatars) ==========
[[r2_buckets]]
binding = "AVATAR_BUCKET"
bucket_name = "encoders-club-avatars"

# ========== KV Namespace (Rate Limiting) ==========
[[kv_namespaces]]
binding = "RATE_LIMITER"
id = "1907cbbd211545bb85230d803d6abb5b"

# ========== Environment Variables ==========
[vars]
NODE_ENV = "production"
SITE_URL = "https://tu-dominio.pages.dev"
