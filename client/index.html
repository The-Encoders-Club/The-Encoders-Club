<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>The Encoders Club</title>
    <meta property="og:title" content="The Encoders Club" />
    <meta property="og:description" content="Novelas visuales en español, gratis para la comunidad hispana." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#080818" />
    <meta name="description" content="Comunidad dedicada a crear y compartir novelas visuales con Ren'Py en español. Aprende, crea y colabora." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/splash.css" />
  </head>
  <body>
    <div id="splash-screen" style="position:fixed;inset:0;z-index:99999;background:#080818;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:opacity 0.9s ease-in-out;">

      <!-- Nebulas (CSS animated) -->
      <div class="splash-nebula-1"></div>
      <div class="splash-nebula-2"></div>

      <!-- Stars — pure CSS, no JS -->
      <div class="splash-stars"></div>

      <!-- Logo con rings -->
      <div class="splash-logo-wrap">
        <div class="splash-logo-glow"></div>
        <div class="splash-ring splash-ring-3"></div>
        <div class="splash-ring splash-ring-2"></div>
        <div class="splash-ring splash-ring-1"></div>
        <img
          src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png"
          class="splash-logo"
          alt="The Encoders Club"
          onerror="this.style.opacity='0'"
        />
        <div class="splash-scan"></div>
      </div>

      <!-- Texto + loader -->
      <div class="splash-text">
        <h1 class="splash-title">The Encoders <span>Club</span></h1>
        <p class="splash-subtitle">Novelas Visuales en Español</p>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>

      <script>
        window.stopSplash = function () {
          var el = document.getElementById('splash-screen');
          if (!el) return;
          el.style.opacity = '0';
          el.style.pointerEvents = 'none';
          setTimeout(function () { el.style.display = 'none'; }, 950);
        };
      </script>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
