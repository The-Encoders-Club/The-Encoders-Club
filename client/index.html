<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>The Encoders Club</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />

    <!-- PWA / Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#080818" />
    <meta name="description" content="Comunidad dedicada a crear y compartir novelas visuales con Ren'Py en español. Aprende, crea y colabora." />

    <!-- Preconnect a dominios de recursos críticos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://files.manuscdn.com" crossorigin />
    <link rel="preconnect" href="https://d2xsxph8kpxj0f.cloudfront.net" crossorigin />

    <!-- Fuentes con display=swap para no bloquear renderizado -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

    <!-- Splash Screen Styles -->
    <link rel="stylesheet" href="/splash.css" />
  </head>
  <body>
    <div id="splash-screen" style="position: fixed; inset: 0; z-index: 99999; background: #080818; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: opacity 0.6s ease-in-out;">
      <!-- Fondo Artístico -->
      <div class="splash-nebula-1"></div>
      <div class="splash-nebula-2"></div>
      <div id="starfield" class="splash-starfield"></div>

      <!-- Partículas decorativas -->
      <div id="particles-container" style="position: absolute; inset: 0; pointer-events: none; z-index: 4;"></div>

      <div class="splash-logo-container">
        <div class="splash-logo-glow"></div>
        <div class="splash-ring-outer"></div>
        <div class="splash-ring"></div>
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" class="splash-logo" alt="Logo" onerror="this.style.display='none'" fetchpriority="high" />
        <div class="splash-scan"></div>
      </div>
      <div class="splash-text-container">
        <h1 class="splash-title">The Encoders <span>Club</span></h1>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>

      <script>
        // Generador de estrellas estáticas (reducido de 80 a 50)
        const starfield = document.getElementById('starfield');
        if (starfield) {
          for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random() * 100) + '%;top:' + (Math.random() * 100) + '%';
            star.style.setProperty('--s-duration', (Math.random() * 3 + 2) + 's');
            starfield.appendChild(star);
          }
        }

        // Estrellas fugaces (intervalo aumentado para menor carga)
        function createShootingStar() {
          const sf = document.getElementById('starfield');
          if (!sf) return;
          const s = document.createElement('div');
          s.className = 'shooting-star';
          s.style.left = (Math.random() * 100 + 20) + '%';
          s.style.top = (Math.random() * 50) + '%';
          sf.appendChild(s);
          setTimeout(function() { s.remove(); }, 2000);
        }
        const shootingStarInterval = setInterval(createShootingStar, 6000);

        // Partículas centrales (intervalo aumentado de 100ms a 200ms)
        const container = document.getElementById('particles-container');
        const colors = ['#FF2D78', '#4D9FFF', '#a855f7'];

        function createParticle() {
          if (!container) return;
          const p = document.createElement('div');
          p.className = 'particle';
          const size = Math.random() * 3 + 2;
          p.style.width = size + 'px';
          p.style.height = size + 'px';
          p.style.background = colors[Math.floor(Math.random() * colors.length)];
          const startX = window.innerWidth / 2;
          const startY = window.innerHeight / 2;
          p.style.left = startX + 'px';
          p.style.top = startY + 'px';
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * 250 + 80;
          p.style.setProperty('--p-tx', (Math.cos(angle) * dist) + 'px');
          p.style.setProperty('--p-ty', (Math.sin(angle) * dist) + 'px');
          const duration = Math.random() * 1.5 + 0.8;
          p.style.animation = 'particle-float ' + duration + 's ease-out forwards';
          container.appendChild(p);
          setTimeout(function() { p.remove(); }, duration * 1000);
        }

        const particleInterval = setInterval(createParticle, 200);

        window.stopParticles = function() {
          clearInterval(particleInterval);
          clearInterval(shootingStarInterval);
        };
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
