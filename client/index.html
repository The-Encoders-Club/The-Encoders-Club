<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>The Encoders Club</title>
    <!-- Favicon para navegadores modernos -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    
    <!-- Apple Touch Icon (para dispositivos iOS y móviles) -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    
    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#080818" />
    <meta name="description" content="Comunidad dedicada a crear y compartir novelas visuales con Ren'Py en español. Aprende, crea y colabora." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
    
    <!-- Splash Screen Styles (External to avoid Tailwind build errors) -->
    <link rel="stylesheet" href="/splash.css" />
  </head>
  <body>
    <div id="splash-screen" style="position: fixed; inset: 0; z-index: 99999; background: #080818; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: opacity 0.8s ease-in-out; will-change: opacity;">
      <!-- Fondo Artístico (Optimizado: Menos capas de blur) -->
      <div class="splash-nebula-1"></div>
      <div class="splash-nebula-2"></div>
      <div id="starfield" class="splash-starfield"></div>
      
      <!-- Partículas decorativas (Optimizadas: Estáticas con animación CSS) -->
      <div id="particles-container" class="splash-particles-static">
        <div class="p-static p1"></div>
        <div class="p-static p2"></div>
        <div class="p-static p3"></div>
        <div class="p-static p4"></div>
        <div class="p-static p5"></div>
        <div class="p-static p6"></div>
      </div>

      <div class="splash-logo-container">
        <div class="splash-logo-glow"></div>
        <div class="splash-ring-outer"></div>
        <div class="splash-ring"></div>
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" class="splash-logo" alt="Logo" onerror="this.style.display='none'">
        <div class="splash-scan"></div>
      </div>
      <div class="splash-text-container">
        <h1 class="splash-title">The Encoders <span>Club</span></h1>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>

      <script>
        // Generador de estrellas estáticas (Optimizado: Ejecución única y fragmento de DOM)
        (function() {
          const starfield = document.getElementById('starfield');
          if (!starfield) return;
          
          const isMobile = window.innerWidth < 768;
          const starCount = isMobile ? 30 : 60;
          const fragment = document.createDocumentFragment();
          
          for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 1.2 + 0.4;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = (Math.random() * 100) + '%';
            star.style.top = (Math.random() * 100) + '%';
            star.style.setProperty('--s-duration', (Math.random() * 3 + 2) + 's');
            fragment.appendChild(star);
          }
          starfield.appendChild(fragment);

          // Estrellas fugaces (Optimizado: Menos frecuencia y solo si la pestaña está activa)
          function createShootingStar() {
            if (document.hidden) return;
            const s = document.createElement('div');
            s.className = 'shooting-star';
            s.style.left = (Math.random() * 100 + 20) + '%';
            s.style.top = (Math.random() * 50) + '%';
            starfield.appendChild(s);
            setTimeout(() => s.remove(), 2000);
          }
          
          const shootingStarInterval = setInterval(createShootingStar, 8000);
          
          window.stopParticles = function() {
            clearInterval(shootingStarInterval);
          };
        })();
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
