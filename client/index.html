<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>The Encoders Club</title>
    <!-- Favicon para navegadores modernos -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    
    <!-- Apple Touch Icon (para dispositivos iOS y móviles) -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    
    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#080818" />
    <meta name="description" content="Comunidad dedicada a crear y compartir novelas visuales con Ren'Py en español. Aprende, crea y colabora." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="splash-screen" style="position: fixed; inset: 0; z-index: 99999; background: #080818; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: opacity 1s ease-in-out;">
      <style>
        /* --- ANIMACIONES --- */
        @keyframes pulse-neon {
          0%, 100% { filter: drop-shadow(0 0 15px rgba(255,45,120,0.5)); transform: scale(1); }
          50% { filter: drop-shadow(0 0 35px rgba(255,45,120,0.9)); transform: scale(1.05); }
        }
        @keyframes scan-laser {
          0%, 100% { top: 0%; opacity: 0; }
          10%, 90% { opacity: 1; }
          50% { top: 100%; }
        }
        @keyframes ring-rotate {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        @keyframes fade-in-up {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes loading-bar {
          from { transform: translateX(-100%); }
          to { transform: translateX(100%); }
        }
        @keyframes particle-float {
          0% { transform: translate(0, 0) scale(1); opacity: 0; }
          20% { opacity: 1; }
          100% { transform: translate(var(--tw-x), var(--tw-y)) scale(0); opacity: 0; }
        }
        @keyframes nebula-drift {
          0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.4; }
          50% { transform: scale(1.2) translate(20px, 10px); opacity: 0.7; }
        }
        @keyframes star-twinkle {
          0%, 100% { opacity: 0.3; transform: scale(0.8); }
          50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes shooting-star {
          0% { transform: translateX(0) translateY(0) rotate(-45deg) scale(0); opacity: 0; }
          10% { opacity: 1; scale(1); }
          100% { transform: translateX(-500px) translateY(500px) rotate(-45deg) scale(1); opacity: 0; }
        }

        /* --- FONDO ARTÍSTICO --- */
        .splash-nebula-1 {
          position: absolute;
          top: -20%;
          left: -10%;
          width: 80%;
          height: 80%;
          background: radial-gradient(circle, rgba(255,45,120,0.15) 0%, transparent 70%);
          filter: blur(60px);
          animation: nebula-drift 8s ease-in-out infinite;
          z-index: 0;
        }
        .splash-nebula-2 {
          position: absolute;
          bottom: -20%;
          right: -10%;
          width: 90%;
          height: 90%;
          background: radial-gradient(circle, rgba(77,159,255,0.15) 0%, transparent 70%);
          filter: blur(80px);
          animation: nebula-drift 10s ease-in-out infinite reverse;
          z-index: 0;
        }
        .splash-starfield {
          position: absolute;
          inset: 0;
          z-index: 1;
          pointer-events: none;
        }
        .star {
          position: absolute;
          background: white;
          border-radius: 50%;
          animation: star-twinkle var(--duration) ease-in-out infinite;
        }
        .shooting-star {
          position: absolute;
          width: 100px;
          height: 2px;
          background: linear-gradient(90deg, white, transparent);
          z-index: 2;
          pointer-events: none;
          animation: shooting-star 2s linear infinite;
        }

        /* --- ELEMENTOS CENTRALES --- */
        .splash-logo-container {
          position: relative;
          width: 220px;
          height: 220px;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 5;
        }
        .splash-logo-glow {
          position: absolute;
          inset: -40px;
          background: radial-gradient(circle, rgba(255,45,120,0.2) 0%, transparent 70%);
          border-radius: 50%;
          z-index: 1;
          filter: blur(20px);
        }
        .splash-ring {
          position: absolute;
          inset: 0;
          border: 2px dashed rgba(255,45,120,0.4);
          border-radius: 50%;
          animation: ring-rotate 3s linear infinite;
          z-index: 2;
        }
        .splash-ring-outer {
          position: absolute;
          inset: -20px;
          border: 1px solid rgba(77,159,255,0.2);
          border-radius: 50%;
          animation: ring-rotate 6s linear infinite reverse;
          z-index: 2;
        }
        .splash-logo {
          width: 160px;
          height: 160px;
          object-fit: contain;
          animation: pulse-neon 2s ease-in-out infinite;
          z-index: 3;
        }
        .splash-scan {
          position: absolute;
          left: -10%;
          right: -10%;
          height: 3px;
          background: linear-gradient(90deg, transparent, #FF2D78, transparent);
          box-shadow: 0 0 20px #FF2D78;
          z-index: 4;
          animation: scan-laser 2s ease-in-out infinite;
          pointer-events: none;
        }
        .splash-text-container {
          margin-top: 50px;
          text-align: center;
          animation: fade-in-up 0.8s ease-out both;
          z-index: 5;
        }
        .splash-title {
          color: white;
          font-family: 'Space Grotesk', sans-serif;
          font-size: 28px;
          font-weight: bold;
          letter-spacing: 0.3em;
          text-transform: uppercase;
          margin: 0;
          text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .splash-title span { color: #FF2D78; text-shadow: 0 0 15px rgba(255,45,120,0.6); }
        
        .splash-loader {
          margin-top: 25px;
          width: 200px;
          height: 3px;
          background: rgba(255,255,255,0.05);
          border-radius: 10px;
          overflow: hidden;
          position: relative;
          margin-left: auto;
          margin-right: auto;
          border: 1px solid rgba(255,255,255,0.1);
        }
        .splash-loader-bar {
          position: absolute;
          inset: 0;
          background: linear-gradient(90deg, transparent, #FF2D78, #4D9FFF, transparent);
          animation: loading-bar 1.5s linear infinite;
        }
        
        .particle {
          position: absolute;
          width: 4px;
          height: 4px;
          background: #FF2D78;
          border-radius: 50%;
          pointer-events: none;
          z-index: 4;
        }
      </style>
      
      <!-- Fondo Artístico -->
      <div class="splash-nebula-1"></div>
      <div class="splash-nebula-2"></div>
      <div id="starfield" class="splash-starfield"></div>
      
      <!-- Partículas decorativas -->
      <div id="particles-container" style="position: absolute; inset: 0; pointer-events: none; z-index: 4;"></div>

      <div class="splash-logo-container">
        <div class="splash-logo-glow"></div>
        <div class="splash-ring-outer"></div>
        <div class="splash-ring"></div>
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" class="splash-logo" alt="Logo" onerror="this.style.display='none'">
        <div class="splash-scan"></div>
      </div>
      <div class="splash-text-container">
        <h1 class="splash-title">The Encoders <span>Club</span></h1>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>

      <script>
        // Generador de estrellas estáticas
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 80; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          const size = Math.random() * 2 + 1;
          star.style.width = `${size}px`;
          star.style.height = `${size}px`;
          star.style.left = `${Math.random() * 100}%`;
          star.style.top = `${Math.random() * 100}%`;
          star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
          starfield.appendChild(star);
        }

        // Generador de estrellas fugaces
        function createShootingStar() {
          const s = document.createElement('div');
          s.className = 'shooting-star';
          s.style.left = `${Math.random() * 100 + 20}%`;
          s.style.top = `${Math.random() * 50}%`;
          starfield.appendChild(s);
          setTimeout(() => s.remove(), 2000);
        }
        const shootingStarInterval = setInterval(createShootingStar, 4000);

        // Generador de partículas centrales
        const container = document.getElementById('particles-container');
        const colors = ['#FF2D78', '#4D9FFF', '#a855f7', '#ffffff'];
        
        function createParticle() {
          const p = document.createElement('div');
          p.className = 'particle';
          const size = Math.random() * 4 + 2;
          p.style.width = `${size}px`;
          p.style.height = `${size}px`;
          p.style.background = colors[Math.floor(Math.random() * colors.length)];
          const startX = window.innerWidth / 2;
          const startY = window.innerHeight / 2;
          p.style.left = `${startX}px`;
          p.style.top = `${startY}px`;
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * 300 + 100;
          const tx = Math.cos(angle) * dist;
          const ty = Math.sin(angle) * dist;
          p.style.setProperty('--tw-x', `${tx}px`);
          p.style.setProperty('--tw-y', `${ty}px`);
          const duration = Math.random() * 2 + 1;
          p.style.animation = `particle-float ${duration}s ease-out forwards`;
          container.appendChild(p);
          setTimeout(() => p.remove(), duration * 1000);
        }

        const particleInterval = setInterval(createParticle, 100);
        
        window.stopParticles = () => {
          clearInterval(particleInterval);
          clearInterval(shootingStarInterval);
        };
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
