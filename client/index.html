<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>The Encoders Club</title>
    <!-- Favicon para navegadores modernos -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    
    <!-- Apple Touch Icon (para dispositivos iOS y móviles) -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    
    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#080818" />
    <meta name="description" content="Comunidad dedicada a crear y compartir novelas visuales con Ren'Py en español. Aprende, crea y colabora." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="splash-screen" style="position: fixed; inset: 0; z-index: 99999; background: #080818; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: opacity 1s ease-in-out;">
      <style>
        /* --- ANIMACIONES --- */
        @keyframes pulse-neon {
          0%, 100% { filter: drop-shadow(0 0 15px rgba(255,45,120,0.5)); transform: scale(1); }
          50% { filter: drop-shadow(0 0 35px rgba(255,45,120,0.9)); transform: scale(1.05); }
        }
        @keyframes scan-laser {
          0%, 100% { top: 0%; opacity: 0; }
          10%, 90% { opacity: 1; }
          50% { top: 100%; }
        }
        @keyframes ring-rotate {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        @keyframes fade-in-up {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes loading-bar {
          from { transform: translateX(-100%); }
          to { transform: translateX(100%); }
        }
        @keyframes particle-float {
          0% { transform: translate(0, 0) scale(1); opacity: 0; }
          20% { opacity: 1; }
          100% { transform: translate(var(--tw-x), var(--tw-y)) scale(0); opacity: 0; }
        }
        @keyframes grid-move {
          0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
          100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }
        @keyframes bg-glow-pulse {
          0%, 100% { opacity: 0.3; transform: scale(1); }
          50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* --- FONDO Y DECORACIÓN --- */
        .splash-bg-grid {
          position: absolute;
          bottom: -50%;
          left: -50%;
          right: -50%;
          height: 100%;
          background-image: 
            linear-gradient(rgba(255,45,120,0.1) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,45,120,0.1) 1px, transparent 1px);
          background-size: 40px 40px;
          animation: grid-move 2s linear infinite;
          z-index: 0;
          pointer-events: none;
        }
        .splash-glow-pink {
          position: absolute;
          top: -10%;
          left: -10%;
          width: 50%;
          height: 50%;
          background: radial-gradient(circle, rgba(255,45,120,0.15) 0%, transparent 70%);
          animation: bg-glow-pulse 4s ease-in-out infinite;
          z-index: 0;
        }
        .splash-glow-blue {
          position: absolute;
          bottom: -10%;
          right: -10%;
          width: 60%;
          height: 60%;
          background: radial-gradient(circle, rgba(77,159,255,0.15) 0%, transparent 70%);
          animation: bg-glow-pulse 5s ease-in-out infinite reverse;
          z-index: 0;
        }
        .splash-scanlines {
          position: absolute;
          inset: 0;
          background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                      linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
          background-size: 100% 3px, 3px 100%;
          z-index: 10;
          pointer-events: none;
          opacity: 0.4;
        }

        /* --- ELEMENTOS CENTRALES --- */
        .splash-logo-container {
          position: relative;
          width: 220px;
          height: 220px;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 5;
        }
        .splash-ring {
          position: absolute;
          inset: 0;
          border: 2px dashed rgba(255,45,120,0.4);
          border-radius: 50%;
          animation: ring-rotate 3s linear infinite;
        }
        .splash-ring-outer {
          position: absolute;
          inset: -20px;
          border: 1px solid rgba(77,159,255,0.2);
          border-radius: 50%;
          animation: ring-rotate 6s linear infinite reverse;
        }
        .splash-logo {
          width: 160px;
          height: 160px;
          object-fit: contain;
          animation: pulse-neon 2s ease-in-out infinite;
          z-index: 2;
        }
        .splash-scan {
          position: absolute;
          left: -10%;
          right: -10%;
          height: 3px;
          background: linear-gradient(90deg, transparent, #FF2D78, transparent);
          box-shadow: 0 0 20px #FF2D78;
          z-index: 3;
          animation: scan-laser 2s ease-in-out infinite;
          pointer-events: none;
        }
        .splash-text-container {
          margin-top: 50px;
          text-align: center;
          animation: fade-in-up 0.8s ease-out both;
          z-index: 5;
        }
        .splash-title {
          color: white;
          font-family: 'Space Grotesk', sans-serif;
          font-size: 28px;
          font-weight: bold;
          letter-spacing: 0.3em;
          text-transform: uppercase;
          margin: 0;
          text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .splash-title span { color: #FF2D78; text-shadow: 0 0 15px rgba(255,45,120,0.6); }
        
        .splash-loader {
          margin-top: 25px;
          width: 200px;
          height: 3px;
          background: rgba(255,255,255,0.05);
          border-radius: 10px;
          overflow: hidden;
          position: relative;
          margin-left: auto;
          margin-right: auto;
          border: 1px solid rgba(255,255,255,0.1);
        }
        .splash-loader-bar {
          position: absolute;
          inset: 0;
          background: linear-gradient(90deg, transparent, #FF2D78, #4D9FFF, transparent);
          animation: loading-bar 1.5s linear infinite;
        }
        
        .particle {
          position: absolute;
          width: 4px;
          height: 4px;
          background: #FF2D78;
          border-radius: 50%;
          pointer-events: none;
          z-index: 4;
        }
      </style>
      
      <!-- Fondo Decorativo -->
      <div class="splash-bg-grid"></div>
      <div class="splash-glow-pink"></div>
      <div class="splash-glow-blue"></div>
      <div class="splash-scanlines"></div>
      
      <!-- Partículas decorativas -->
      <div id="particles-container" style="position: absolute; inset: 0; pointer-events: none; z-index: 4;"></div>

      <div class="splash-logo-container">
        <div class="splash-ring-outer"></div>
        <div class="splash-ring"></div>
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" class="splash-logo" alt="Logo" onerror="this.style.display='none'">
        <div class="splash-scan"></div>
      </div>
      <div class="splash-text-container">
        <h1 class="splash-title">The Encoders <span>Club</span></h1>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>

      <script>
        const container = document.getElementById('particles-container');
        const colors = ['#FF2D78', '#4D9FFF', '#a855f7', '#ffffff'];
        
        function createParticle() {
          const p = document.createElement('div');
          p.className = 'particle';
          const size = Math.random() * 4 + 2;
          p.style.width = `${size}px`;
          p.style.height = `${size}px`;
          p.style.background = colors[Math.floor(Math.random() * colors.length)];
          const startX = window.innerWidth / 2;
          const startY = window.innerHeight / 2;
          p.style.left = `${startX}px`;
          p.style.top = `${startY}px`;
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * 300 + 100;
          const tx = Math.cos(angle) * dist;
          const ty = Math.sin(angle) * dist;
          p.style.setProperty('--tw-x', `${tx}px`);
          p.style.setProperty('--tw-y', `${ty}px`);
          const duration = Math.random() * 2 + 1;
          p.style.animation = `particle-float ${duration}s ease-out forwards`;
          container.appendChild(p);
          setTimeout(() => p.remove(), duration * 1000);
        }

        const particleInterval = setInterval(createParticle, 100);
        window.stopParticles = () => clearInterval(particleInterval);
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
