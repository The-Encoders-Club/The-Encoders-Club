<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>The Encoders Club</title>
    <!-- Favicon para navegadores modernos -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    
    <!-- Apple Touch Icon (para dispositivos iOS y móviles) -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" />
    
    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#080818" />
    <meta name="description" content="Comunidad dedicada a crear y compartir novelas visuales con Ren'Py en español. Aprende, crea y colabora." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
    
    <!-- Splash Screen Styles (External to avoid Tailwind build errors) -->
    <link rel="stylesheet" href="/splash.css" />
  </head>
  <body>
    <!-- Restaurada la transición original de 1s -->
    <div id="splash-screen" style="position: fixed; inset: 0; z-index: 99999; background: #080818; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: opacity 1s ease-in-out;">
      <div class="splash-project-bg"></div>
      <div class="splash-project-overlay"></div>
      <!-- Fondo Artístico -->
      <div class="splash-nebula-1"></div>
      <div class="splash-nebula-2"></div>
      <div class="splash-grid-glow"></div>
      <div class="splash-code-orbit splash-code-orbit-1"></div>
      <div class="splash-code-orbit splash-code-orbit-2"></div>
      <div class="splash-code-orbit splash-code-orbit-3"></div>
      <div id="starfield" class="splash-starfield"></div>
      
      <!-- Partículas decorativas -->
      <div id="particles-container" style="position: absolute; inset: 0; pointer-events: none; z-index: 4;"></div>

      <div class="splash-logo-container">
        <div class="splash-logo-glow"></div>
        <div class="splash-logo-glow-blue"></div>
        <div class="splash-logo-glow-purple"></div>
        <div class="splash-ring-halo"></div>
        <div class="splash-ring-outer"></div>
        <div class="splash-ring"></div>
        <div class="splash-ring-inner"></div>
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663518113549/KEigSkzYpCzkACRU.png" class="splash-logo" alt="Logo" onerror="this.style.display='none'">
        <div class="splash-scan"></div>
      </div>
      <div class="splash-text-container">
        <h1 class="splash-title">The Encoders <span>Club</span></h1>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>

      <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // Generador de estrellas estáticas (Optimizado para móviles)
        const starfield = document.getElementById('starfield');
        if (starfield) {
          const starCount = isMobile ? 25 : 80; 
          const fragment = document.createDocumentFragment();
          for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 1.2 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = (Math.random() * 100) + '%';
            star.style.top = (Math.random() * 100) + '%';
            star.style.setProperty('--s-duration', (Math.random() * 4 + 4) + 's');
            fragment.appendChild(star);
          }
          starfield.appendChild(fragment);
        }

        // Generador de estrellas fugaces (Optimizado para móviles)
        function createShootingStar() {
          const sf = document.getElementById('starfield');
          if (!sf || (isMobile && Math.random() > 0.15)) return; 
          const s = document.createElement('div');
          s.className = 'shooting-star';
          s.style.left = (Math.random() * 100 + 20) + '%';
          s.style.top = (Math.random() * 50) + '%';
          sf.appendChild(s);
          setTimeout(function() { if(s.parentNode) s.remove(); }, 2000);
        }
        const shootingStarInterval = setInterval(createShootingStar, isMobile ? 12000 : 4000);

        // Generador de partículas centrales (Optimizado para móviles)
        const container = document.getElementById('particles-container');
        const colors = ['#FF2D78', '#4D9FFF', '#a855f7', '#ffffff'];
        let activeParticles = 0;
        const maxParticles = isMobile ? 10 : 30; 
        
        function createParticle() {
          if (!container || activeParticles >= maxParticles) return;
          
          activeParticles++;
          const p = document.createElement('div');
          p.className = 'particle';
          const size = Math.random() * 2 + 1;
          p.style.width = size + 'px';
          p.style.height = size + 'px';
          p.style.background = colors[Math.floor(Math.random() * colors.length)];
          
          const startX = window.innerWidth / 2;
          const startY = window.innerHeight / 2;
          p.style.left = startX + 'px';
          p.style.top = startY + 'px';
          
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * (isMobile ? 130 : 250) + 40;
          const tx = Math.cos(angle) * dist;
          const ty = Math.sin(angle) * dist;
          
          p.style.setProperty('--p-tx', tx + 'px');
          p.style.setProperty('--p-ty', ty + 'px');
          
          const duration = Math.random() * 1.2 + 0.8;
          p.style.animation = 'particle-float ' + duration + 's ease-out forwards';
          
          container.appendChild(p);
          
          setTimeout(function() { 
            if(p.parentNode) p.remove(); 
            activeParticles--;
          }, duration * 1000);
        }

        const particleInterval = setInterval(createParticle, isMobile ? 350 : 150);
        
        // Restaurada la lógica de cierre original exacta
        window.stopParticles = function() {
          clearInterval(particleInterval);
          clearInterval(shootingStarInterval);
          
          const splash = document.getElementById('splash-screen');
          if (splash) {
            splash.style.opacity = '0';
            // El original no tenía setTimeout para display:none, 
            // se desvanecía y quedaba con opacidad 0.
            // Pero para optimizar, lo ocultaremos después de la transición de 1s.
            setTimeout(() => {
              splash.style.display = 'none';
            }, 1000);
          }
        };
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
